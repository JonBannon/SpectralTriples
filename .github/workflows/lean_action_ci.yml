name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Opt in to Node.js 24 early, since some actions used here (transitively,
      # via docgen-action) are still pinned to Node.js 20 actions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1

      # Pinned to a commit on `main` rather than `@v1`: the `v1` branch's
      # `blueprint: true` support still uses a pip invocation
      # (`--global-option=...`) that current pip rejects, has no `deploy`
      # input, and always uploads/deploys `docs/` itself. This commit fixes
      # the pip invocation and builds the blueprint, runs checkdecls, builds
      # the API docs, and deploys everything as a single Pages artifact.
      - uses: leanprover-community/docgen-action@10db47458f91456d87804787d3dfcd914b9a19e3
        with:
          blueprint: true

  # Kernel-authoritative axiom certificate: regenerate the #print axioms trace for
  # the tracked headlines and fail if it drifts from the committed golden file.
  # This guarantees the headlines stay sorry-free and that any change to a
  # headline's axiom set is a reviewed diff. See math-commons/formalization-assurance.
  axiom-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - name: Axiom report matches the kernel
        run: |
          lake env lean scripts/axiom_report.lean > axiom-report.regenerated.txt
          if ! diff -u axiom-report.txt axiom-report.regenerated.txt; then
            echo "::error::axiom-report.txt is out of sync with the kernel #print axioms output."
            echo "::error::Regenerate and commit:  lake env lean scripts/axiom_report.lean > axiom-report.txt"
            exit 1
          fi
          echo "### ✓ Axiom report matches the kernel (headlines are axiom-clean)" >> "$GITHUB_STEP_SUMMARY"
