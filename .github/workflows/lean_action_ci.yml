name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  pages: write # Write access to GitHub Pages
  id-token: write # Write access to ID tokens

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Opt in to Node.js 24 early, since some actions used here (transitively,
      # via docgen-action) are still pinned to Node.js 20 actions.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1

      # Pinned to a commit on `main` rather than `@v1`: the `v1` branch's
      # `blueprint: true` support still uses a pip invocation
      # (`--global-option=...`) that current pip rejects, has no `deploy`
      # input, and always uploads/deploys `docs/` itself. This commit fixes
      # the pip invocation and builds the blueprint, runs checkdecls, builds
      # the API docs, and deploys everything as a single Pages artifact.
      - uses: leanprover-community/docgen-action@10db47458f91456d87804787d3dfcd914b9a19e3
        with:
          blueprint: true
          # Only deploy to GitHub Pages from pushes to `main`. Otherwise, pushes to
          # feature branches and PRs would overwrite the live site with their own
          # (often incomplete) docs/blueprint build, even though the build itself
          # still runs everywhere as a CI check.
          deploy: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          # The shared "Docs-<hash>" GitHub Actions cache used to speed up Mathlib's
          # doc-gen4 build is keyed only on lake-manifest.json, so it's shared across
          # all branches. When another branch's build (with a different local module
          # set) saves this cache, restoring it on `main` causes Lake to treat the
          # `SpectralTriples:docs` facet as already up to date (a stale doc-manifest)
          # and skip regenerating navbar/index/per-module HTML for this package.
          # Disabling the cache here makes `main`'s deployment self-contained and
          # correct regardless of what other branches do, at the cost of a slower
          # (~35-40 min) docs build.
          use-github-cache: "false"
